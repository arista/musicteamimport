<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MusicTeam Import - Verification</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>MusicTeam Import Verification</h1>
      <div class="stats" id="stats"></div>
    </header>

    <div class="filters">
      <label>
        Status:
        <select id="filter-status">
          <option value="">All</option>
          <option value="pending">Pending</option>
          <option value="verified">Verified</option>
          <option value="flagged">Flagged</option>
          <option value="skipped">Skipped</option>
        </select>
      </label>
      <label>
        Search:
        <input type="text" id="filter-search" placeholder="Title, author, tag...">
      </label>
      <label>
        <input type="checkbox" id="filter-flags-only">
        Flagged only
      </label>
    </div>

    <div class="main-layout">
      <div class="song-list-container">
        <div class="song-list" id="song-list"></div>
      </div>

      <div class="detail-panel" id="detail-panel">
        <div class="placeholder">Select a song to view details</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
